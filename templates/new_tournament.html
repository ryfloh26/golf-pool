{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2>New Tournament</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Tournament Name</label>
                    <input type="text" name="name" class="form-control" placeholder="The Players Championship" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Year</label>
                    <input type="number" name="year" class="form-control" value="2026" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">ESPN Event ID <span class="text-muted">(for live scores)</span></label>
                    <input type="text" name="espn_event_id" class="form-control" placeholder="e.g. 20260312 or 401580344">
                    <div class="form-text">
                        Enter a date (YYYYMMDD) for past tournaments or an ESPN event ID.
                        Leave blank to pull the current/next tournament automatically.
                    </div>
                    {% if espn_events %}
                    <div class="mt-2">
                        <label class="form-label small text-muted">Available events from ESPN:</label>
                        <select class="form-select form-select-sm" onchange="document.querySelector('[name=espn_event_id]').value=this.value">
                            <option value="">-- Pick an event --</option>
                            {% for ev in espn_events %}
                            <option value="{{ ev.id }}">{{ ev.name }} ({{ ev.id }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}
                </div>
                <button type="submit" class="btn btn-masters">Create Tournament</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
