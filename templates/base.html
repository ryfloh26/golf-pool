<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Golf Pool{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { background: #1a472a; color: #fff; min-height: 100vh; }
        .card { background: #fff; color: #333; }
        .navbar { background: #0d2818 !important; }
        .table { color: #333; }
        .leaderboard-table th { background: #2d5a3d; color: #fff; }
        .leaderboard-table .rank-1 { background: #ffd700; color: #333; font-weight: bold; }
        .leaderboard-table .rank-2 { background: #c0c0c0; color: #333; }
        .leaderboard-table .rank-3 { background: #cd7f32; color: #fff; }
        .mc-badge { background: #dc3545; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .golfer-detail { font-size: 0.85em; color: #666; }
        .ts-wrapper { min-width: 250px; }
        .btn-masters { background: #2d5a3d; color: #fff; border: none; }
        .btn-masters:hover { background: #1a472a; color: #ffd700; }
        .score-input { width: 70px; }
        .mc-check { width: 20px; height: 20px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Golf Pool 2026</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
