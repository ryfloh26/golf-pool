{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2>Add Pool Member</h2>
            <p class="text-muted">{{ tournament.name }} {{ tournament.year }}</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-masters">Add Member</button>
                <a href="{{ url_for('tournament', tid=tournament.id) }}" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
